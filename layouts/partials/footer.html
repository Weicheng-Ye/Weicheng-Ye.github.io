<style>
    .footer .footer-content {
        align-items: center;
        display: flex;
        gap: 2rem;
        justify-content: space-between;
        margin: .25rem 0;
        text-align: left;
        width: 100%;
    }

    .footer .footer-content__owner,
    .footer .footer-content__links a {
        white-space: nowrap;
    }

    .footer .footer-content__links {
        align-items: center;
        display: flex;
        gap: 2.5rem;
    }

    @media screen and (max-width: 845px) {
        .footer .footer-content {
            flex-direction: column;
            gap: .75rem;
            text-align: center;
        }

        .footer .footer-content__links {
            column-gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            row-gap: .75rem;
        }
    }
</style>
<div class="footer-content">
    <span class="footer-content__owner">@Weicheng Ye</span>
    <nav class="footer-content__links" aria-label="Footer links">
        {{ range where .Site.Params.social "name" "google-scholar" }}<a href="{{ .url }}" target="_blank" rel="noopener noreferrer">Scholar</a>{{ end }}
        {{ range where .Site.Params.social "name" "github" }}<a href="{{ .url }}" target="_blank" rel="noopener noreferrer">GitHub</a>{{ end }}
        {{ range where .Site.Params.social "name" "email" }}<a href="{{ .url }}">Email</a>{{ end }}
        {{ range where .Site.Params.social "name" "linkedin" }}<a href="{{ .url }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>{{ end }}
    </nav>
</div>
